<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container hero-mobile">
        <img src="../assets/images/hero/hero_mobile.png" alt="hero image">
        <img src="../assets/images/hero/hero_mobile_detail.png" alt="hero image details">
    </div>

    <div class="container guidance-card guidance-card-mobile">
        <h3>Get Expert Dental Guidance in Delhi</h3>
            <p>Book your free consultation today and take the first step towards healthy, beautiful teeth.</p>

            <form class="guidance-card-form">
                <input type="text" name="name" placeholder="Name">
                <input type="text" name="mobile" placeholder="Mobile Number">
                <div class="captcha-input-box">
                    <div class="input-area">
                        <input type="text" name="Captcha" placeholder="Captcha">
                    </div>
                    <button type="button">1514</button>
                </div>

                <div class="terms-input-box">
                    <input type="checkbox" id="terms" name="terms">

                    <label for="terms">
                        I agree to CLOVE Dental’s
                        <a href="#">Terms</a> and
                        <a href="#">Privacy Policy</a>
                        and consent to contact via phone, email, or SMS.
                    </label>
                </div>

                <button type="button" class="book-button">Book a Free Consultation</button>
            </form>
    </div>



    <!-- CREATING HERO IMAGE AND GUIDANCE FOR DESKTOP & TAB DISPLAYS -->
    <div class="hero-desktop container">
        <div class="image-form-container">
            <div class="hero-image">
                <img src="../assets/images/hero/hero_frame_desktop.png" alt="hero image">
            </div>
            <div class="guidance-card-desktop">
                <h3 class="guidance-card-desktop-title">Get Expert Dental Guidance in Delhi</h2>
                <p class="guidance-card-desktop-description">Book your free consultation today and take the first step towards healthy, beautiful teeth.</p>  

                <form class="guidance-card-form desktop-guidance-form">
                    <input type="text" name="name" placeholder="Name">
                    <input type="text" name="mobile" placeholder="Mobile Number">
                    <div class="captcha-input-box">
                        <div class="input-area">
                            <input type="text" name="Captcha" placeholder="Captcha">
                        </div>
                        <button type="button">1514</button>
                    </div>

                    <div class="terms-input-box">
                        <input type="checkbox" id="terms" name="terms">

                        <label for="terms">
                            I agree to CLOVE Dental’s
                            <a href="#">Terms</a> and
                            <a href="#">Privacy Policy</a>
                            and consent to contact via phone, email, or SMS.
                        </label>
                    </div>

                    <button type="button" class="book-button">Book a Free Consultation</button>
                </form>
            </div>
        </div>
        <div class="service-image-container">
            <div class="service-image-desktop">
                <img src="../assets/images/hero/services_frame_desktop.png" alt="service image">
            </div>
        </div>
    </div>
</body>

</html>
